name: CI Build - Smoke Test

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke-test:
    name: Build e Smoke Test do Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Build da imagem
        run: docker build -t ctr-utils:ci .

      - name: Subir container para teste
        run: docker run -d --name ctr-utils-test ctr-utils:ci

      - name: Aguardar inicialização
        run: sleep 5

      - name: Validar se o container está em execução
        run: |
          if [ "$(docker inspect -f '{{.State.Running}}' ctr-utils-test)" != "true" ]; then
            echo "Container não permaneceu em execução."
            docker logs ctr-utils-test || true
            exit 1
          fi

      - name: Exibir logs do container
        if: always()
        run: docker logs ctr-utils-test || true

      - name: Remover container
        if: always()
        run: docker rm -f ctr-utils-test || true