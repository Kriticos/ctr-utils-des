name: Trivy Scan

# =========================================================
# WORKFLOW: Trivy Scan
# ---------------------------------------------------------
# Este workflow executa:
#
# 1) Scan do repositório (filesystem) com relatório JSON
# 2) Build da imagem Docker + scan da imagem em SARIF
#
# Estratégia atual:
# - scan-repo: bloqueante + artifact JSON
# - scan-image: bloqueante + upload SARIF para Security
# =========================================================

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # =======================================================
  # JOB 1 - SCAN DO REPOSITÓRIO
  # -------------------------------------------------------
  # Mantém relatório JSON como artifact para evidência.
  # =======================================================
  scan-repo:
    name: Trivy - Scan do Repositório
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Rodar Trivy no repositório
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-repo-report.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Upload do relatório do repositório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-repo-report
          path: trivy-repo-report.json

  # =======================================================
  # JOB 2 - BUILD E SCAN DA IMAGEM
  # -------------------------------------------------------
  # Gera SARIF e envia o resultado para o GitHub Security.
  # =======================================================
  scan-image:
    name: Trivy - Build e Scan da Imagem
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Build da imagem Docker
        run: docker build -t container-utils:ci .

      - name: Rodar Trivy na imagem local
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: container-utils:ci
          format: sarif
          output: trivy-image-report.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Upload do relatório SARIF como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report-sarif
          path: trivy-image-report.sarif

      - name: Enviar SARIF para o GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-report.sarif