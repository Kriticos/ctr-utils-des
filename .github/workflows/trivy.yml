name: Trivy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-repo:
    name: Trivy - Scan do Repositório
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Rodar Trivy no repositório
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  scan-image:
    name: Trivy - Build e Scan da Imagem
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Build da imagem Docker
        run: docker build -t ctr-utils:trivy .

      - name: Rodar Trivy na imagem
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ctr-utils:trivy
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH