name: Trivy Scan

# =========================================================
# WORKFLOW: Trivy Scan
# ---------------------------------------------------------
# Este workflow executa dois tipos de análise:
#
# 1) Scan do repositório (filesystem)
# 2) Build da imagem Docker do projeto + scan da imagem
#
# Estratégia atual:
# - scan-repo: informativo
# - scan-image: bloqueante
# =========================================================

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  # =======================================================
  # JOB 1 - SCAN DO REPOSITÓRIO
  # -------------------------------------------------------
  # Analisa o conteúdo do projeto.
  # Neste momento fica em modo informativo.
  # =======================================================
  scan-repo:
    name: Trivy - Scan do Repositório
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Rodar Trivy no repositório
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

  # =======================================================
  # JOB 2 - BUILD E SCAN DA IMAGEM
  # -------------------------------------------------------
  # Faz o build da imagem Docker do projeto e executa
  # o Trivy na imagem local gerada.
  #
  # Agora este job é BLOQUEANTE:
  # - se houver HIGH ou CRITICAL, falha a esteira
  # =======================================================
  scan-image:
    name: Trivy - Build e Scan da Imagem
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Build da imagem Docker
        run: docker build -t container-utils:ci .

      - name: Rodar Trivy na imagem local
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: container-utils:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1