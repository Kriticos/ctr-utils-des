name: Publish Image

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ctr-utils-des

jobs:
  publish:
    name: Publish Image - GHCR
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@3961bf35f681ee1e1e861681555e62c8cd2605c9

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@3961bf35f681ee1e1e861681555e62c8cd2605c9

      - name: Login no GHCR
        uses: docker/login-action@3961bf35f681ee1e1e861681555e62c8cd2605c9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@3961bf35f681ee1e1e861681555e62c8cd2605c9
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=manual,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=ctr-utils-des
            org.opencontainers.image.description=Imagem Docker publicada via GitHub Actions
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Exibir tags geradas
        run: |
          echo "Imagem: ${{ env.IMAGE_NAME }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"

      - name: Build e push da imagem
        id: push
        uses: docker/build-push-action@3961bf35f681ee1e1e861681555e62c8cd2605c9
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Gerar artifact attestation
        uses: actions/attest-build-provenance@3961bf35f681ee1e1e861681555e62c8cd2605c9
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true