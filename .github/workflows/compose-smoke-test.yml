name: Docker Compose Smoke Test

on:
  push:
    branches:
      - main
    paths:
      - 'docker-compose.yml'
      - '.env.example'
      - 'Dockerfile'
      - 'scripts/**'
      - 'cron/**'
  pull_request:
    paths:
      - 'docker-compose.yml'
      - '.env.example'
      - 'Dockerfile'
      - 'scripts/**'
      - 'cron/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compose-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Docker Compose - Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Preparar arquivo .env para teste
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo ".env.example não encontrado"
            exit 1
          fi

      - name: Criar rede Docker externa para teste
        run: docker network create --subnet 172.18.0.0/16 network-share

      - name: Exibir versão do Docker
        run: docker version

      - name: Exibir versão do Docker Compose
        run: docker compose version

      - name: Subir stack para smoke test
        run: docker compose up -d --build

      - name: Exibir status dos serviços
        if: always()
        run: docker compose ps

      - name: Exibir logs dos serviços
        if: always()
        run: docker compose logs --no-color

      - name: Derrubar stack
        if: always()
        run: docker compose down -v

      - name: Remover rede externa de teste
        if: always()
        run: docker network rm network-share || true