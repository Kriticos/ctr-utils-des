name: ShellCheck

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'prepare.sh'
  pull_request:
    paths:
      - 'scripts/**'
      - 'prepare.sh'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shellcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck - Validar scripts shell
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Rodar ShellCheck nos scripts .sh
        run: |
          set -euo pipefail

          arquivos=$(find ./scripts -type f -name "*.sh" ; find . -maxdepth 1 -type f -name "*.sh")

          if [ -z "$arquivos" ]; then
            echo "Nenhum arquivo .sh encontrado."
            exit 0
          fi

          echo "Arquivos encontrados:"
          echo "$arquivos"

          docker run --rm -v "$PWD:/mnt" -w /mnt koalaman/shellcheck:stable $arquivos