name: Hadolint

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.hadolint.yaml'
  pull_request:
    paths:
      - 'Dockerfile'
      - '.hadolint.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hadolint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hadolint:
    name: Hadolint - Validar Dockerfile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Rodar Hadolint no Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile